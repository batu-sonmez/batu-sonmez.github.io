        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/batusonmez

  about:
    enable: true
    title: "About Me"
    image: "/images/profile.jpg"
    content: |-
      I'm a DevSecOps Engineer at Chubb with 3+ years of experience building and operating secure, reliable distributed systems. I hold a B.S. in Computer Engineering and two Master's degrees — one in Information Technology and one in Cybersecurity (4.0 GPA).

      I'm passionate about the intersection of **SRE and AI** — using AI models to transform how we monitor, debug, and operate production systems. I've built AI-powered governance tools, automated CI/CD pipelines at enterprise scale, and I'm an active builder in the Claude/Anthropic ecosystem.

      Currently targeting senior SRE/Production Engineering roles at top AI and tech companies.
    skills:
