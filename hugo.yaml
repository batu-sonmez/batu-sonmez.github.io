        - "Python"
        - "Go"
        - "TypeScript"
        - "Kubernetes"
        - "Docker"
        - "Terraform"
        - "Prometheus"
        - "Grafana"
        - "ELK Stack"
        - "Jenkins"
        - "GitHub Actions"
        - "Azure / GCP / AWS"
        - "Claude API"
        - "MCP Servers"

