            content: |
              - Improved CI/CD pipeline reliability, reducing deployment failures by 30%
              - Built AI-powered governance tools using Claude, implementing AI policy across infrastructure
              - Implemented observability platforms (Prometheus, Grafana, ELK, Splunk)
              - Led incident response and postmortem processes for production systems
              - Mentored teams on DevOps fundamentals through Chubb's Excellence Academy

      - company: "Millcraft LLC"
        jobs:
