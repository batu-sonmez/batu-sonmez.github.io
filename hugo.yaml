baseURL: "https://batu-sonmez.github.io/"
languageCode: "en-us"
title: "Batu Sonmez | SRE & DevSecOps Engineer"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: blog
      name: Blog
      title: Blog
      url: /blogs
      weight: 1
    - identifier: projects
      name: Projects
      title: Projects
      url: /#projects
      weight: 2

params:
  title: "Batu Sonmez"
  description: "SRE & DevSecOps Engineer | AI Infrastructure Specialist"
  favicon: "/images/favicon.png"
  useBootstrapCDN: false
  animate: true

  theme:
    defaultTheme: "dark"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Batu Sonmez"
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: true
